# =============================================
# SERVER CONFIGURATION
# =============================================
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false
server.error.path=/error
server.host=http://localhost:8080

# =============================================
# DATABASE - CLEVER CLOUD MYSQL
# =============================================
spring.datasource.url=jdbc:mysql://bwvd440sbi9to7ovezke-mysql.services.clever-cloud.com:3306/bwvd440sbi9to7ovezke?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=ubwsqrqjeyeh4jyb
spring.datasource.password=4n9uq3bqiilAo8HdcZe9
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# CONNECTION POOL
# =============================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# =============================================
# JPA & HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# =============================================
# FILE UPLOAD CONFIGURATION
# =============================================
file.upload-dir=C:/hrms/uploads
app.upload.base-path=C:/hrms/uploads
app.upload.directory=C:/hrms/uploads
app.upload.max-file-size=10485760
app.upload.allowed-file-types=pdf,doc,docx,txt,jpg,jpeg,png
file.upload.directory=C:/hrms/uploads
file.upload.max-size=5MB

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=false

# =============================================
# STATIC RESOURCES
# =============================================
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:///C:/hrms/uploads/
spring.web.resources.cache.period=3600
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
spring.mvc.static-path-pattern=/**
spring.mvc.favicon.enabled=false
spring.mvc.throw-exception-if-no-handler-found=false

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.enabled=true
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.enable-spring-el-compiler=true

# =============================================
# SECURITY
# =============================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.security.user.name=admin
spring.security.user.password=admin123

# =============================================
# EMAIL
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =============================================
# WEBSOCKET
# =============================================
spring.websocket.enabled=true
spring.websocket.session-timeout=60000

# =============================================
# SESSION
# =============================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.max-age=1800

# =============================================
# JACKSON
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# =============================================
# TOMCAT
# =============================================
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.uri-encoding=UTF-8

# =============================================
# MVC / VIEW
# =============================================
spring.mvc.view.prefix=classpath:/templates/
spring.mvc.view.suffix=.html

# =============================================
# ONBOARDING
# =============================================
onboarding.document.max-size=10MB
onboarding.document.allowed-types=pdf,jpg,jpeg,png
onboarding.reminder.days=3
sms.simulation.enabled=true
app.preview.enabled=true
app.preview.max-file-size=5242880
app.preview.supported-types=pdf,doc,docx,txt,jpg,jpeg,png
profile.pictures.directory=uploads/profile-pictures

# =============================================
# ERROR HANDLING
# =============================================
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-binding-errors=always
server.error.include-exception=false

# =============================================
# LOGGING
# =============================================
logging.level.com.mentis.hrms=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO
logging.file.name=hrms.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# =============================================
# APPLICATION
# =============================================
spring.application.name=HRMS-Recruitment-System