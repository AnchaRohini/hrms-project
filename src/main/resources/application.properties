# =============================================
# SERVER CONFIGURATION
# =============================================
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false
server.error.path=/error

# =============================================
# DATABASE CONFIGURATION - Render PostgreSQL
# =============================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://dpg-d7tas8vavr4c738inoog-a.singapore-postgres.render.com:5432/hrms_team_db?sslmode=require
spring.datasource.username=hrms_team_db_user
spring.datasource.password=WynfzVNCZqH3gbfs0aYIfQMRklWmhckf

# =============================================
# JPA & HIBERNATE CONFIGURATION
# =============================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =============================================
# DISABLE SEEDERS TEMPORARILY
# =============================================
spring.sql.init.mode=never
# =============================================
# DATABASE CONNECTION POOL SETTINGS
# =============================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000


# =============================================
# FILE UPLOAD CONFIGURATION
# =============================================
file.upload-dir=C:/hrms/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
app.upload.base-path=C:/hrms/uploads
file.upload.directory=C:/hrms/uploads

# =============================================
# STATIC RESOURCE CONFIGURATION
# =============================================
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:///C:/hrms/uploads/
spring.web.resources.cache.period=3600
spring.web.resources.cache.cachecontrol.max-age=3600
spring.mvc.static-path-pattern=/**

# =============================================
# MIME TYPES FOR FILE PREVIEW
# =============================================
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.media-types.pdf=application/pdf
spring.web.resources.chain.strategy.content.media-types.doc=application/msword
spring.web.resources.chain.strategy.content.media-types.docx=application/vnd.openxmlformats-officedocument.wordprocessingml.document
spring.web.resources.chain.strategy.content.media-types.jpg=image/jpeg
spring.web.resources.chain.strategy.content.media-types.png=image/png
spring.web.resources.chain.strategy.content.media-types.txt=text/plain

# =============================================
# THYMELEAF CONFIGURATION
# =============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.enabled=true

# =============================================
# VIEW RESOLVER CONFIGURATION
# =============================================
spring.mvc.view.prefix=classpath:/templates/
spring.mvc.view.suffix=.html

# =============================================
# SPRING MVC CONFIGURATION
# =============================================
spring.mvc.throw-exception-if-no-handler-found=false
spring.mvc.favicon.enabled=false

# =============================================
# SECURITY CONFIGURATION
# =============================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# =============================================
# JACKSON JSON CONFIGURATION
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# =============================================
# TOMCAT SERVER CONFIGURATION
# =============================================
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.uri-encoding=UTF-8

# =============================================
# WEBSOCKET CONFIGURATION
# =============================================
spring.websocket.enabled=true
spring.websocket.session-timeout=60000
spring.mvc.cors.allowed-origins=http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true

# =============================================
# LOGGING CONFIGURATION
# =============================================
logging.level.com.mentis.hrms=DEBUG
logging.level.com.mentis.hrms.controller=DEBUG
logging.level.com.mentis.hrms.service=DEBUG
logging.level.com.mentis.hrms.repository=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=hrms.log

# =============================================
# ERROR HANDLING
# =============================================
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-binding-errors=always
debug=true

# =============================================
# APPLICATION NAME
# =============================================
spring.application.name=HRMS-Recruitment-System

# =============================================
# EMAIL CONFIGURATION
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================
# FILE UPLOAD ALLOWED TYPES
# =============================================
app.upload.max-file-size=10485760
app.upload.allowed-file-types=pdf,doc,docx,txt,jpg,jpeg,png
app.preview.enabled=true
app.preview.max-file-size=5242880

# =============================================
# ONBOARDING CONFIGURATION
# =============================================
onboarding.document.max-size=10MB
onboarding.document.allowed-types=pdf,jpg,jpeg,png
onboarding.reminder.days=3

# =============================================
# PROFILE PICTURE CONFIGURATION
# =============================================
profile.pictures.directory=uploads/profile-pictures
file.upload.max-size=5MB

# =============================================
# SESSION CONFIGURATION
# =============================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# =============================================
# SMS SIMULATION MODE
# =============================================
sms.simulation.enabled=true