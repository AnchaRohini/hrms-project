<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --dark-text-secondary: #cbd5e1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #0ea5e9;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
        }

        .login-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .login-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--dark-border);
        }

        .login-tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: var(--dark-text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .login-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .login-tab:hover {
            color: var(--dark-text);
        }

        .login-form {
            display: none;
        }

        .login-form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--primary);
            color: var(--dark-text);
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.25);
        }

        .form-text {
            color: var(--dark-text-secondary) !important;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-link {
            color: var(--primary);
            text-decoration: none;
            padding: 0;
            font-size: 0.9rem;
        }

        .btn-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .alert {
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="fas fa-user-check fa-3x text-primary"></i>
            </div>
            <h2 class="text-primary">Candidate Portal</h2>
            <p class="text-muted">Access your onboarding dashboard</p>
        </div>

        <!-- Tabs -->
        <div class="login-tabs">
            <button class="login-tab active" onclick="showTab('initial')">Initial Login</button>
            <button class="login-tab" onclick="showTab('password')">Password Login</button>
        </div>

        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>

        <!-- Initial Login Form (Last Name) -->
        <form id="initialLoginForm" class="login-form active" th:action="@{/candidate/onboarding/access}" method="post">
            <div class="mb-3">
                <label for="employeeId" class="form-label">Employee ID</label>
                <input type="text" class="form-control" id="employeeId" name="employeeId"
                       placeholder="Enter your Employee ID" required>
                <div class="form-text">
                    <i class="fas fa-info-circle me-1"></i>
                    Provided in your offer letter
                </div>
            </div>

            <div class="mb-4">
                <label for="accessToken" class="form-label">Password</label>
                <input type="text" class="form-control" id="accessToken" name="accessToken"
                       placeholder="Enter your last name" required>
                <div class="form-text">
                    <i class="fas fa-key me-1"></i>
                    Use your last name
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                <i class="fas fa-sign-in-alt me-2"></i>New Credentials
            </button>

            <div class="text-center mt-3">
                <a href="/candidate/forgot-password" class="btn-link">
                    <i class="fas fa-question-circle me-1"></i>Forgot Password?
                </a>
            </div>
        </form>

        <!-- Password Login Form -->
        <form id="passwordLoginForm" class="login-form" th:action="@{/candidate/login-with-password}" method="post">
            <div class="mb-3">
                <label for="passwordEmployeeId" class="form-label">Employee ID</label>
                <input type="text" class="form-control" id="passwordEmployeeId" name="employeeId"
                       placeholder="Enter your Employee ID" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter your password" required>
                <div class="form-text">
                    <i class="fas fa-lock me-1"></i>
                    Use the password you created
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>

            <div class="text-center">
                <a href="/candidate/forgot-password" class="btn-link">
                    <i class="fas fa-key me-1"></i>Forgot Password?
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showTab(tabName) {
        // Update tabs
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.classList.remove('active');
        });

        if (tabName === 'initial') {
            document.querySelectorAll('.login-tab')[0].classList.add('active');
        } else {
            document.querySelectorAll('.login-tab')[1].classList.add('active');
        }

        // Update forms
        document.querySelectorAll('.login-form').forEach(form => {
            form.classList.remove('active');
        });

        if (tabName === 'initial') {
            document.getElementById('initialLoginForm').classList.add('active');
        } else {
            document.getElementById('passwordLoginForm').classList.add('active');
        }
    }

    // Check URL for success messages
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const success = urlParams.get('success');
        const error = urlParams.get('error');

        if (success) {
            showTab('password');
        }
    });
</script>
</body>
</html>
