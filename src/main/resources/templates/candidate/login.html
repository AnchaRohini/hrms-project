<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Onboarding Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Add this to the <head> section of all your templates -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --dark-text-secondary: #cbd5e1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-container {
            max-width: 400px;
            margin: 0 auto;
        }

        .login-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 15px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--primary);
            color: var(--dark-text);
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.25);
        }

        .form-control::placeholder {
            color: var(--dark-text-secondary);
        }

        .form-text {
            color: var(--dark-text-secondary) !important;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .alert {
            border: none;
            border-radius: 8px;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="fas fa-user-check fa-3x text-primary"></i>
                </div>
                <h2 class="text-primary">Candidate Onboarding Portal</h2>
                <p class="text-muted">Access your onboarding dashboard</p>
            </div>

            <!-- Success/Error Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/candidate/onboarding/access}" method="post">
                <div class="mb-3">
                    <label for="employeeId" class="form-label text-muted">Employee ID</label>
                    <input type="text" class="form-control" id="employeeId" name="employeeId"
                           placeholder="Enter your Employee ID" required>
                    <div class="form-text">
                        <i class="fas fa-info-circle me-1"></i>
                        This was provided in your offer letter
                    </div>
                </div>

                <div class="mb-4">
                    <label for="accessToken" class="form-label text-muted">Access Token</label>
                    <input type="text" class="form-control" id="accessToken" name="accessToken"
                           placeholder="Enter your last name" required>
                    <div class="form-text">
                        <i class="fas fa-key me-1"></i>
                        Use your last name as access token
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Access My Onboarding
                </button>
            </form>

            <div class="text-center">
                <small class="text-muted">
                    <i class="fas fa-life-ring me-1"></i>
                    Need help? Contact HR at hr@mentis.com
                </small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
