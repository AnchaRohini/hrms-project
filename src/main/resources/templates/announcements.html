<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --primary: #6366f1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--dark-text);
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: var(--dark-bg);
            box-shadow: 2px 0 10px rgba(0,0,0,.2);
            z-index: 1000;
            padding-top: 1.5rem;
        }

        .sidebar-brand {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid var(--dark-border);
            color: #fff;
            font-weight: 600;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: #fff;
            color: var(--dark-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-content {
            padding: 1rem 0;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.65rem 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.2s;
            margin: 0.25rem 0.5rem;
            border-radius: 6px;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #1e293b;
            color: #fff;
        }

        .main-content {
            margin-left: 280px;
            padding: 1.5rem;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--dark-text);
        }

        .btn-create {
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: #fff;
            border: none;
            padding: 0.65rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, .3);
        }

        .announcements-table {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .table {
            width: 100%;
            margin: 0;
            color: var(--dark-text);
        }

        .table thead {
            background: rgba(0,0,0,0.3);
        }

        .table th {
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 600;
            color: #cbd5e1;
            padding: 1rem 0.75rem;
            border-bottom: 1px solid var(--dark-border);
        }

        .table td {
            padding: 0.875rem 0.75rem;
            border-top: 1px solid var(--dark-border);
        }

        .table tbody tr:hover {
            background: rgba(255,255,255,.05);
        }

        .badge {
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-permanent {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .badge-temporary {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .badge-all {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .badge-hr-only {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .badge-employees {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .badge-low { background: rgba(107, 114, 128, 0.1); color: #6b7280; }
        .badge-normal { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .badge-high { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .badge-urgent { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .status-inactive {
            background: rgba(107, 114, 128, 0.1);
            color: #6b7280;
        }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .btn-edit {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .btn-edit:hover {
            background: var(--primary);
            color: #fff;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-delete:hover {
            background: #ef4444;
            color: #fff;
        }

        .btn-pin {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .btn-pin:hover {
            background: #f59e0b;
            color: #000;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #cbd5e1;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }

        .modal.show {
            display: block;
        }

        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            margin: 5% auto;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--dark-border);
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--dark-text);
        }

        .close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close:hover {
            color: var(--dark-text);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark-text);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--dark-border);
            background: var(--dark-bg);
            color: var(--dark-text);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--dark-border);
        }

        .btn-cancel {
            background: var(--dark-bg);
            color: var(--dark-text);
            border: 1px solid var(--dark-border);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: rgba(255,255,255, 0.05);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">
            <i class="fas fa-building"></i>
        </div>
        <span>Menti's IT</span>
    </div>
    <div class="sidebar-content">
        <a href="/dashboard/hr" class="nav-link">
            <i class="fas fa-home"></i>
            <span>Overview</span>
        </a>
        <a href="/dashboard/hr/announcements" class="nav-link active">
            <i class="fas fa-bullhorn"></i>
            <span>Announcements</span>
        </a>
        <a href="/dashboard/hr/applications" class="nav-link">
            <i class="fas fa-briefcase"></i>
            <span>Applications</span>
        </a>
        <a href="/dashboard/hr" class="nav-link">
            <i class="fas fa-sign-out"></i>
            <span>Logout</span>
        </a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    <!-- HEADER -->
    <div class="header">
        <div>
            <h1><i class="fas fa-bullhorn"></i> Announcements Management</h1>
            <p style="color: #cbd5e1; margin-top: 0.5rem; font-size: 0.9rem;">
                Super Admin Only - Create and manage company-wide announcements
            </p>
        </div>
        <button class="btn-create" onclick="openCreateModal()">
            <i class="fas fa-plus"></i>
            Create Announcement
        </button>
    </div>

    <!-- ALERTS -->
    <div id="alert-container"></div>

    <!-- ANNOUNCEMENTS TABLE -->
    <div class="announcements-table">
        <table class="table">
            <thead>
            <tr>
                <th>TITLE</th>
                <th>CATEGORY</th>
                <th>TYPE</th>
                <th>PRIORITY</th>
                <th>TARGET</th>
                <th>CREATED</th>
                <th>EXPIRES</th>
                <th>STATUS</th>
                <th>ACTIONS</th>
            </tr>
            </thead>
            <tbody id="announcements-tbody">
            <tr>
                <td colspan="9" style="text-align: center; padding: 2rem;">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading announcements...</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- CREATE/EDIT MODAL -->
<div id="announcementModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Create Announcement</h2>
            <button class="close" onclick="closeModal()">&times;</button>
        </div>

        <form id="announcementForm">
            <div class="form-group">
                <label for="title">Title <span style="color: #ef4444;">*</span></label>
                <input type="text" id="title" name="title" placeholder="e.g., Company Holiday Schedule" required>
            </div>

            <div class="form-group">
                <label for="description">Description <span style="color: #ef4444;">*</span></label>
                <textarea id="description" name="description" placeholder="Enter announcement details..." required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option value="">Select Category</option>
                        <option value="General">General</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                        <option value="Operations">Operations</option>
                        <option value="Security">Security</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="type">Type <span style="color: #ef4444;">*</span></label>
                    <select id="type" name="type" required>
                        <option value="">Select Type</option>
                        <option value="PERMANENT">Permanent</option>
                        <option value="TEMPORARY">Temporary</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="NORMAL" selected>Normal</option>
                        <option value="LOW">Low</option>
                        <option value="HIGH">High</option>
                        <option value="URGENT">Urgent</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="targetAudience">Target Audience <span style="color: #ef4444;">*</span></label>
                    <select id="targetAudience" name="targetAudience" required>
                        <option value="ALL" selected>All (HR + Employees)</option>
                        <option value="HR_ONLY">HR Only</option>
                        <option value="EMPLOYEES_ONLY">Employees Only</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="expiresAt">Expires At (for Temporary)</label>
                <input type="datetime-local" id="expiresAt" name="expiresAt">
            </div>

            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="isPinned" name="isPinned" style="width: auto;">
                    <span>Pin this announcement (appears at top)</span>
                </label>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn-submit">Create Announcement</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ===== LOAD ANNOUNCEMENTS ON PAGE LOAD =====
    document.addEventListener('DOMContentLoaded', function() {
        loadAnnouncements();

        document.getElementById('announcementForm').addEventListener('submit', function(e) {
            e.preventDefault();
            createAnnouncement();
        });
    });

    // ===== LOAD ANNOUNCEMENTS =====
    function loadAnnouncements() {
        console.log('📢 Loading announcements...');

        fetch('/api/announcements', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            console.log('✅ Announcements loaded:', data);
            if (data.success && Array.isArray(data.data)) {
                displayAnnouncements(data.data);
            } else {
                displayError('Failed to load announcements');
            }
        })
        .catch(error => {
            console.error('❌ Error loading announcements:', error);
            displayError('Failed to load announcements: ' + error.message);
        });
    }

    // ===== DISPLAY ANNOUNCEMENTS IN TABLE =====
    function displayAnnouncements(announcements) {
        const tbody = document.getElementById('announcements-tbody');

        if (!announcements || announcements.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="9">
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h4>No announcements yet</h4>
                            <p>Create your first announcement by clicking the button above.</p>
                        </div>
                    </td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = announcements.map(ann => `
            <tr>
                <td style="font-weight: 600;">${escapeHtml(ann.title)}</td>
                <td><span class="badge">${ann.category || 'N/A'}</span></td>
                <td><span class="badge ${ann.type === 'PERMANENT' ? 'badge-permanent' : 'badge-temporary'}">${ann.type || 'N/A'}</span></td>
                <td><span class="badge badge-${ann.priority?.toLowerCase() || 'normal'}">${ann.priority || 'N/A'}</span></td>
                <td>
                    <span class="badge ${
                        ann.targetAudience === 'ALL' ? 'badge-all' :
                        ann.targetAudience === 'HR_ONLY' ? 'badge-hr-only' :
                        'badge-employees'
                    }">
                        ${ann.targetAudience?.replace(/_/g, ' ') || 'N/A'}
                    </span>
                </td>
                <td>${formatDate(ann.createdAt)}</td>
                <td>${ann.expiresAt ? formatDate(ann.expiresAt) : '–'}</td>
                <td><span class="badge ${ann.isActive ? 'status-active' : 'status-inactive'}">${ann.isActive ? 'ACTIVE' : 'INACTIVE'}</span></td>
                <td>
                    <div style="display: flex; gap: 0.25rem;">
                        <button class="btn-sm btn-pin" onclick="togglePin(${ann.id})" title="Pin/Unpin">
                            <i class="fas fa-thumbtack"></i>
                        </button>
                        <button class="btn-sm btn-delete" onclick="deleteAnnouncement(${ann.id})" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // ===== CREATE ANNOUNCEMENT =====
    function createAnnouncement() {
        const form = document.getElementById('announcementForm');

        const payload = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            category: document.getElementById('category').value,
            type: document.getElementById('type').value,
            priority: document.getElementById('priority').value,
            targetAudience: document.getElementById('targetAudience').value,
            expiresAt: document.getElementById('expiresAt').value || null,
            isPinned: document.getElementById('isPinned').checked
        };

        console.log('📝 Creating announcement:', payload);

        fetch('/api/announcements/create', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            console.log('✅ Response:', data);

            if (data.success) {
                showAlert('Announcement created successfully!', 'success');
                closeModal();
                form.reset();
                loadAnnouncements();
            } else {
                showAlert(data.error || 'Failed to create announcement', 'danger');
            }
        })
        .catch(error => {
            console.error('❌ Error:', error);
            showAlert('Error: ' + error.message, 'danger');
        });
    }

    // ===== DELETE ANNOUNCEMENT =====
    function deleteAnnouncement(id) {
        if (!confirm('Are you sure you want to delete this announcement?')) return;

        fetch(`/api/announcements/${id}`, {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showAlert('Announcement deleted!', 'success');
                loadAnnouncements();
            } else {
                showAlert(data.error || 'Failed to delete', 'danger');
            }
        })
        .catch(error => showAlert('Error: ' + error.message, 'danger'));
    }

    // ===== TOGGLE PIN =====
    function togglePin(id) {
        fetch(`/api/announcements/${id}/pin`, {
            method: 'PATCH'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showAlert('Announcement updated!', 'success');
                loadAnnouncements();
            } else {
                showAlert(data.error || 'Failed to update', 'danger');
            }
        })
        .catch(error => showAlert('Error: ' + error.message, 'danger'));
    }

    // ===== MODAL FUNCTIONS =====
    function openCreateModal() {
        document.getElementById('announcementModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('announcementModal').classList.remove('show');
    }

    // ===== ALERT FUNCTION =====
    function showAlert(message, type) {
        const container = document.getElementById('alert-container');
        const alert = document.createElement('div');
        alert.className = `alert alert-${type}`;
        alert.innerHTML = `
            <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
            <span>${message}</span>
        `;
        container.appendChild(alert);

        setTimeout(() => alert.remove(), 5000);
    }

    function displayError(message) {
        showAlert(message, 'danger');
    }

    // ===== HELPER FUNCTIONS =====
    function formatDate(dateString) {
        if (!dateString) return '–';
        const date = new Date(dateString);
        return date.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('announcementModal');
        if (event.target === modal) {
            closeModal();
        }
    }
</script>

</body>
</html>
